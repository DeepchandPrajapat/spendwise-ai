<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Expense Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
  />
  <style>
    body::before {
        content: '';
        position: fixed;
        top: 0;
        right: 0;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle at top right, rgba(52, 211, 153, 0.15), transparent 70%);
        pointer-events: none;
        z-index: 0;
    }
    main {
        position: relative;
        z-index: 1;
    }
</style>
</head>
<body class="bg-gray-100 min-h-screen flex">
    <!-- SIDEBAR -->
    <aside class="w-56 min-h-screen bg-[rgb(4,19,32)] text-white flex flex-col">
      <div class="px-6 py-6 border-b border-white/10 flex items-center gap-3">
        <!-- rupee icon -->
        <i
          class="fa-solid fa-money-bill-transfer text-2xl leading-none"
          style="color: rgb(52, 211, 153)"
        ></i>
        <!-- two tone text -->
        <span class="text-xl font-bold">
          <span class="text-white">Spend</span
          ><span class="text-emerald-400">Wise AI</span>
        </span>
      </div>

      <!-- navigation links -->
      <nav class="flex-1 px-4 py-6 flex flex-col gap-2">
        <a href="index.html" class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-white/10 text-white/70 hover:text-white transition">
          <i class="fa-solid fa-chart-pie"></i>
          Dashboard
        </a>
        <a href="expenses.html" class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-white/10 text-white/70 hover:text-white transition">
          <i class="fa-solid fa-list"></i>
          All Expenses
        </a>
        <a href="add-expense.html" class="flex items-center gap-3 px-4 py-2 rounded-lg bg-emerald-600/30 text-emerald-400 font-medium">
          <i class="fa-solid fa-plus"></i>
          Add Expense
        </a>
      </nav>

        <!-- bottom -->
        <div class="px-6 py-4 border-t border-white/10">
            <p class="text-white/50 text-sm">SpendWise AI v1.0</p>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="flex-1 p-8 overflow-y-auto">
        <!-- page header -->
        <div class="mb-8">
            <h1 class="text-2xl font-bold text-gray-800">Add New Expense</h1>
            <p class="text-gray-500 mt-1">Fill in the details below to add a new expense</p>
        </div>

        <!-- form card -->
        <div class="bg-white p-8 rounded-xl shadow-sm border border-gray-100">
            <form id="expense-form">
                <!-- amount -->
                <div class="mb-5">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Amount (₹)</label>
                    <input type="number" id="amount" placeholder="Enter amount" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-emerald-400 text-gray-700" required/>
                </div>

                <!-- category dropdown -->
                <div class="mb-5">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Category</label>
                    <select id="category" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-emerald-400 text-gray-700" required>
                        <option value="">Select a category</option>
                        <option value="Food & Dining">Food & Dining</option>
                        <option value="Transport">Transport</option>
                        <option value="Shopping">Shopping</option>
                        <option value="Entertainment">Entertainment</option>
                        <option value="Health & Medical">Health & Medical</option>
                        <option value="Education">Education</option>
                        <option value="Bills & Utilities">Bills & Utilities</option>
                        <option value="Rent">Rent</option>
                        <option value="Travel">Travel</option>
                        <option value="Personal Care">Personal Care</option>
                        <option value="Other">Other</option>
                    </select>
                </div>

                <!-- custom category (hidden by default) -->
                <div id="custom-category-div" class="mb-5 hidden">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Custom Category</label>
                    <input type="text" id="custom-category" placeholder="Enter custom category" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-emerald-400 text-gray-700"/>
                </div>

                <!-- description -->
                <div class="mb-5">
                    <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
                    <input type="text" id="description" placeholder="Enter description" class="w-full border border-gray-300 rounded-lg p-3 focus:outline-none focus:ring-2 focus:ring-emerald-400 text-gray-700"/>
                </div>

                <!-- submit button -->
                <button type="submit" class="w-full bg-emerald-500 text-white py-3 rounded-lg hover:bg-emerald-600 transition font-medium">Add Expense</button>
            </form>
        </div>
    </main>

    <script src="script/add-expense.js"></script>
</body>
</html>
